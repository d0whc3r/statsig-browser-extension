name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write # for semantic-release to push tags and releases
  issues: write # for semantic-release to comment on issues
  pull-requests: write # for semantic-release to comment on PRs

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0 # Required for semantic-release to analyze commits
          persist-credentials: false # Required for semantic-release/git

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm vitest run --reporter=dot --silent --coverage.reporter=lcovonly

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build extension for e2e
        run: pnpm build:chrome

      - name: Run e2e tests
        run: pnpm exec xvfb-run --auto-servernum -- playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.sha }}-playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
