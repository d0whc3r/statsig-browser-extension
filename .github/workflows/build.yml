name: "Build the extension"
on:
  pull_request:
    types: [opened, reopened, synchronize]

  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096 --trace-warnings"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Use Node.js 24.x
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm vitest run --reporter=dot --silent --coverage.reporter=lcovonly

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build the extension
        run: pnpm run zip:chrome

      - name: Archive the extension production build as ZIP
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.sha }}-prod-build
          path: .output/*-chrome.zip
          retention-days: 30
