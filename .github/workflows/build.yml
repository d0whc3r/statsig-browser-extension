name: "Build the extension"
on:
  pull_request:
    types: [opened, reopened, synchronize]

  workflow_dispatch:

env:
  NODE_OPTIONS: "--max-old-space-size=4096 --trace-warnings"

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm vitest run --reporter=dot --silent --coverage.reporter=lcovonly

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Build the extension
        run: pnpm run zip:chrome

      - name: Archive the extension production build as ZIP
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.sha }}-prod-build
          path: .output/*-chrome.zip
          retention-days: 30

  e2e:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Use Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build extension for e2e
        run: pnpm build:chrome

      - name: Run e2e tests
        run: pnpm exec xvfb-run --auto-servernum -- playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: ${{ github.sha }}-playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 14
